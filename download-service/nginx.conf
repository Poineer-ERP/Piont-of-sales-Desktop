server {
    listen 80;
    server_name _;

    location = /windows {
        return 302 https://github.com/Poineer-ERP/Desktop/releases/latest/download/Qeyam-Setup.exe;
    }

    location = /windows/zip {
        return 302 https://github.com/Poineer-ERP/Desktop/releases/latest/download/Qeyam-win.zip;
    }

    location = /mac {
        return 302 https://github.com/Poineer-ERP/Desktop/releases/latest/download/Qeyam.dmg;
    }

    location = /mac/zip {
        return 302 https://github.com/Poineer-ERP/Desktop/releases/latest/download/Qeyam-mac.zip;
    }

    location = / {
        default_type application/json;
        return 200 '{"status":"ok","windows":"/windows","mac":"/mac"}';
    }
}
